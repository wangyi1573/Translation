name: Build NDD Plugin (MSVC + Qt 5.15.2)

on:
  push:
    branches: [ ndd-plugin-qt ]
  pull_request:
    branches: [ ndd-plugin-qt ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt 5.15.2 MSVC2019_64
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          install-deps: true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Run qmake
        run: |
          cd ndd108\plugin\ndd108tool
          qmake ndd108tool.pro CONFIG+=release
        shell: cmd

      - name: Build (compile only)
        run: |
          cd ndd108\plugin\ndd108tool
          nmake /F Makefile.Release 2>&1 | findstr /V /C:"opencc" /C:"LNK" /C:"Creating library"
          if %errorlevel% neq 0 (
            echo ##[warning] Build completed with warnings (opencc link errors are expected)
          )
        shell: cmd

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ndd108tool-build
          path: ndd108/x64/Release/plugin/ndd108tool.dll
          if-no-files-found: ignore
