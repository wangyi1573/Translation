name: Build NDD Plugin (MSVC + Qt 5.15.2)

on:
  push:
    branches: [ ndd-plugin-qt ]
  pull_request:
    branches: [ ndd-plugin-qt ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt 5.15.2 MSVC2019_64
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          install-deps: true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install OpenCC via vcpkg (dynamic, MD CRT)
        run: |
          vcpkg install opencc:x64-windows --allow-unsupported
          if not exist "ndd108\plugin\ndd108tool\lib" mkdir "ndd108\plugin\ndd108tool\lib"
          copy "C:\vcpkg\installed\x64-windows\lib\opencc.lib" "ndd108\plugin\ndd108tool\lib\opencc.lib"
          copy "C:\vcpkg\installed\x64-windows\lib\marisa.lib" "ndd108\plugin\ndd108tool\lib\marisa.lib"
        shell: cmd

      - name: Run qmake for ndd108tool
        run: |
          cd ndd108\plugin\ndd108tool
          qmake ndd108tool.pro CONFIG+=release
        shell: cmd

      - name: Build ndd108tool plugin
        run: |
          cd ndd108\plugin\ndd108tool
          nmake /F Makefile.Release
        shell: cmd

      - name: Collect artifacts
        run: |
          if not exist "artifacts" mkdir "artifacts"
          dir "C:\vcpkg\installed\x64-windows\bin\*.dll"
          copy "C:\vcpkg\installed\x64-windows\bin\opencc.dll" "artifacts\opencc.dll"
          if exist "C:\vcpkg\installed\x64-windows\bin\marisa.dll" (
            copy "C:\vcpkg\installed\x64-windows\bin\marisa.dll" "artifacts\marisa.dll"
          ) else (
            echo marisa.dll not found in vcpkg bin directory - may be statically linked into opencc.dll
          )
        shell: cmd

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ndd108tool-build
          path: |
            ndd108/x64/Release/plugin/ndd108tool.dll
            artifacts/opencc.dll
            artifacts/marisa.dll
          if-no-files-found: ignore
